name: Check yt-dlp update

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 8 * * *'  # min hour day month weekday | Every day at 8:00 UTC
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest yt-dlp version
        id: latest
        run: |
          VERSION=$(curl -s https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest \
            | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get current version from package.json
        id: current
        run: |
          VERSION=$(jq -r '.ytdlpVersion // "none"' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          jq '.ytdlpVersion = "${{ steps.latest.outputs.version }}"' package.json > tmp.json \
            && mv tmp.json package.json

      - name: Create Pull Request
        if: steps.latest.outputs.version != steps.current.outputs.version
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/ytdlp-${{ steps.latest.outputs.version }}
          title: "⬆️ yt-dlp ${{ steps.current.outputs.version }} → ${{ steps.latest.outputs.version }}"
          body: |
            | | Version |
            |---|---|
            | **Current** | `${{ steps.current.outputs.version }}` |
            | **New** | `${{ steps.latest.outputs.version }}` |

            **Changelog:** https://github.com/yt-dlp/yt-dlp/releases/tag/${{ steps.latest.outputs.version }}
          commit-message: "chore: update yt-dlp to ${{ steps.latest.outputs.version }}"
          labels: dependencies